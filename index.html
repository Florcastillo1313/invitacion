<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación 15 - Isabela</title>

<style>
body {
  margin: 0;
  font-family: 'Arial', sans-serif;
  background: linear-gradient(to bottom, #0a1f44, #1e3c72);
  color: white;
  text-align: center;
}

.section {
  padding: 60px 20px;
}

h1 {
  font-size: 3em;
}

.fade {
  opacity: 0;
  transform: translateY(30px);
  transition: 1s;
}

.fade.visible {
  opacity: 1;
  transform: translateY(0);
}

.btn {
  background: #ffffff;
  color: #0a1f44;
  padding: 15px 25px;
  border-radius: 30px;
  text-decoration: none;
  display: inline-block;
  margin-top: 20px;
}

img {
  width: 80%;
  border-radius: 20px;
  margin-top: 20px;
}

.roses {
  font-size: 2em;
}
</style>
</head>

<body>

<div class="section">
  <h2>? Estás invitado ?</h2>
</div>

<div class="section fade">
  <h1>Isabela</h1>
  <p class="roses">??????</p>
</div>

<div class="section fade">
  <h2>Faltan:</h2>
  <h1 id="contador"></h1>
</div>

<div class="section fade">
  <h2>?? 16 Mayo 2026</h2>
  <h3>?? Domingo Sabio 118</h3>
</div>

<div class="section fade">
  <img src="foto1.jpg">
</div>

<div class="section fade">
  <img src="foto2.jpg">
</div>

<div class="section fade">
  <a class="btn" href="https://wa.me/549XXXXXXXXXX" target="_blank">
    Confirmar asistencia ??
  </a>
</div>

<script>
// contador
const fechaEvento = new Date("May 16, 2026 00:00:00").getTime();

setInterval(() => {
  const ahora = new Date().getTime();
  const distancia = fechaEvento - ahora;

  const dias = Math.floor(distancia / (1000 * 60 * 60 * 24));
  const horas = Math.floor((distancia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));

  document.getElementById("contador").innerHTML = dias + " días " + horas + " hs";
}, 1000);

// animaciones
const elementos = document.querySelectorAll(".fade");

window.addEventListener("scroll", () => {
  elementos.forEach(el => {
    const pos = el.getBoundingClientRect().top;
    if (pos < window.innerHeight - 100) {
      el.classList.add("visible");
    }
  });
});
</script>

</body>
</html>
