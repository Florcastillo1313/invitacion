<style>

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:linear-gradient(#0a1435,#1d2f6f);
color:white;
text-align:center;
overflow-x:hidden;
}

/* cielo */
.cielo{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:0;
}

.estrella{
position:absolute;
font-size:20px;
animation: caer linear forwards;
}

@keyframes caer{
0%{transform:translateY(-10px);opacity:1;}
100%{transform:translateY(100vh);opacity:0;}
}

/* contenido */
.contenido{
position:relative;
z-index:1;
}

/* corona */
.corona{
font-size:85px;
margin-top:40px;
animation: flotar 3s ease-in-out infinite, brillo 2s infinite;
}

@keyframes flotar{
0%{transform:translateY(0)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0)}
}

@keyframes brillo{
0%{filter: drop-shadow(0 0 5px #cfd8ff);}
50%{filter: drop-shadow(0 0 25px #ffffff);}
100%{filter: drop-shadow(0 0 5px #cfd8ff);}
}

h1{
font-family:'Great Vibes',cursive;
font-size:70px;
margin:10px;
color:#e5ecff;
}

h2{
font-weight:300;
letter-spacing:3px;
}

/* secciones */

.section{
padding:60px 20px;
}

.fade{
opacity:0;
transform:translateY(40px);
transition:1s;
}

.fade.visible{
opacity:1;
transform:translateY(0);
}

.count{
font-size:40px;
margin-top:10px;
}

/* galeria */

img{
width:80%;
max-width:400px;
border-radius:20px;
margin:20px;
box-shadow:0 0 20px rgba(255,255,255,0.3);
}

/* boton */

.btn{
background:white;
color:#0a1f44;
padding:15px 30px;
border-radius:30px;
text-decoration:none;
display:inline-block;
margin-top:20px;
font-size:18px;
}
